services:
  - type: web
    name: reelbot-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./deploy/render/start-api.sh
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 60
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: TEST_GROUP_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: IG_COOKIES_PATH
        value: ""
      - key: REELBOT_ENABLE_VIDEO_DOWNLOAD
        value: "false"
      # The dedicated worker owns all ML (embeddings, whisper, ingest); the
      # API must never load them or it exceeds the starter instance memory.
      - key: REELBOT_API_DRAIN_JOBS
        value: "false"
      - key: NUDGE_INTERVAL_HOURS
        value: "3"
      - key: NUDGE_COOLDOWN_DAYS
        value: "3"
      - key: NUDGE_CLUSTER_COOLDOWN_DAYS
        value: "14"
      - key: NUDGE_MIN_ITEMS
        value: "3"
      - key: NUDGE_RECENCY_DAYS
        value: "7"
      - key: NUDGE_IMPACT_WINDOW_HOURS
        value: "24"

  - type: worker
    name: reelbot-worker
    runtime: docker
    plan: standard
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./deploy/render/start-worker.sh
    maxShutdownDelaySeconds: 300
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: TEST_GROUP_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: IG_COOKIES_PATH
        value: ""
      # Full video download for frame OCR (on-screen text like workout lists);
      # media lives only in a temp dir per job and is deleted after extraction.
      # Worker runs on the 2GB plan; keep this false on the 512MB API service.
      - key: REELBOT_ENABLE_VIDEO_DOWNLOAD
        value: "true"
      - key: REELBOT_ENABLE_TRANSCRIPTION
        value: "true"
      - key: NUDGE_INTERVAL_HOURS
        value: "3"
      - key: NUDGE_COOLDOWN_DAYS
        value: "3"
      - key: NUDGE_CLUSTER_COOLDOWN_DAYS
        value: "14"
      - key: NUDGE_MIN_ITEMS
        value: "3"
      - key: NUDGE_RECENCY_DAYS
        value: "7"
      - key: NUDGE_IMPACT_WINDOW_HOURS
        value: "24"

  - type: cron
    name: reelbot-scheduler
    runtime: docker
    plan: starter
    region: oregon
    schedule: "0 */3 * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./deploy/render/run-scheduler-once.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: TEST_GROUP_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: IG_COOKIES_PATH
        value: ""
      - key: REELBOT_ENABLE_VIDEO_DOWNLOAD
        value: "false"
      - key: NUDGE_INTERVAL_HOURS
        value: "3"
      - key: NUDGE_COOLDOWN_DAYS
        value: "3"
      - key: NUDGE_CLUSTER_COOLDOWN_DAYS
        value: "14"
      - key: NUDGE_MIN_ITEMS
        value: "3"
      - key: NUDGE_RECENCY_DAYS
        value: "7"
      - key: NUDGE_IMPACT_WINDOW_HOURS
        value: "24"
